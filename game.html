<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 RPG Fundraiser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        #menu {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        .character {
            width: 100px;
            height: 100px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #battleScreen {
            display: none;
            margin: 20px;
            text-align: center;
        }
        #battleLog {
            height: 100px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            background-color: #fff;
            overflow-y: auto;
        }
        .platform {
            width: 200px;
            height: 200px;
            display: inline-block;
            border: 1px solid #000;
            background-color: #e0e0e0;
            vertical-align: top;
        }
        button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Web3 RPG Fundraiser</h1>
    <div id="menu">
        <button id="playButton">Play</button>
    </div>
    <div id="characterSelection">
        <h2>Select Your Character</h2>
        <div class="character">Character 1</div>
        <div class="character">Character 2</div>
        <div class="character">Character 3</div>
        <div class="character">Character 4</div>
        <div class="character">Character 5</div>
        <div class="character">Character 6</div>
        <div class="character">Character 7</div>
        <div class="character">Character 8</div>
        <div class="character">Character 9</div>
        <div class="character">Character 10</div>
    </div>
    <div id="battleScreen">
        <h2>Battle Screen</h2>
        <div class="platform" id="playerPlatform">
            <img src="player.png" alt="Player Sprite" />
            <h3>Player</h3>
        </div>
        <div class="platform" id="enemyPlatform">
            <img src="enemy.png" alt="Enemy Sprite" />
            <h3>Enemy</h3>
        </div>
        <div id="battleLog">
            <p>Battle Log:</p>
        </div>
        <button id="attackButton">Attack</button>
        <button id="defendButton">Defend</button>
        <button id="runButton">Run</button>
    </div>
    <script>
        document.getElementById('playButton').onclick = function() {
            document.getElementById('characterSelection').style.display = 'none';
            document.getElementById('battleScreen').style.display = 'block';
        };
    </script>
</body>
</html>
